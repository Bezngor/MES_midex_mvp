version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: mes_backend
    env_file:
      - backend/.env.production
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro  # Mount config directory (read-only)
    networks:
      - dokploy-network
      - main-supabase-1kebyl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - VITE_API_URL=https://mes-midex-ru.factoryall.ru/api/v1
    container_name: mes_frontend
    ports:
      - "3000:80"
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mes-frontend.rule=Host(`mes-midex-ru.factoryall.ru`)"
      - "traefik.http.routers.mes-frontend.entrypoints=websecure"
      - "traefik.http.routers.mes-frontend.tls=true"
      - "traefik.http.routers.mes-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.mes-frontend.loadbalancer.server.port=80"
      # HTTP router with redirect to HTTPS
      - "traefik.http.routers.mes-frontend-http.rule=Host(`mes-midex-ru.factoryall.ru`)"
      - "traefik.http.routers.mes-frontend-http.entrypoints=web"
      - "traefik.http.routers.mes-frontend-http.middlewares=redirect-to-https@file"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  dokploy-network:
    external: true
  main-supabase-1kebyl:
    external: true
