# Usage instructions
usage:
  quick_start:
    - step: 1
      description: "Clone template-base branch"
      command: "git clone -b template-base https://github.com/Bezngor/MES_midex.git"
      
    - step: 2
      description: "Configure for your factory"
      command: "cp config/factory_config.example.yaml config/factory_config.yaml"
      
    - step: 3
      description: "Setup environment"
      command: "cp .env.example .env"
      
    - step: 4
      description: "Deploy to production"
      command: "docker compose -f docker-compose.production.yml up -d"
      
  validation:
    - "Check /api/health endpoint returns 200 OK"
    - "Verify SSL certificate via browser (https://)"
    - "Run smoke tests: pytest backend/tests/smoke/"
    - "Create test manufacturing order via UI"

# Support & Contact
support:
  github_issues: "https://github.com/Bezngor/MES_midex/issues"
