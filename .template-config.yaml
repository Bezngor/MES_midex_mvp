      release_date: "2026-01-15"
      changes:
        - "Process manufacturing support (batches)"
        - "Multi-level BOM"
        - "Inventory management (simplified WMS)"
        
    - version: "1.0.0"
      release_date: "2025-12-01"
      changes:
        - "Initial discrete manufacturing MVP"
        - "Basic MRP"
        - "Work orders & tasks"

# Roadmap (future versions)
roadmap:
  v2_2:
    target_quarter: "Q2 2026"
    features:
      - "Multi-tenancy (multiple factories)"
      - "Advanced WMS (bin management, FIFO/FEFO)"
      - "1C/SAP ERP integration"
      - "Mobile app (React Native)"
      
  v2_3:
