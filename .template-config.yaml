# MES Platform Template Configuration
# This file contains metadata about the template for automation and validation

template:
  name: "MES Platform Universal Template"
  version: "2.1.0"
  release_date: "2026-01-19"
  status: "production-ready"
  description: "Universal Manufacturing Execution System for discrete, process, and hybrid production"
  
  # Git reference for this template version
  git:
    tag: "v2.1.0-template"
    branch: "template-base"
    repository: "https://github.com/Bezngor/MES_midex"
  
  # Template maintainer
  maintainer:
    name: "MES Development Team"
    contact: "support@your-company.com"

# Supported industries and production types
supported_industries:
  - name: "Discrete Manufacturing"
    examples:
      - "Machinery & Equipment"
      - "Electronics & Electrical"
      - "Furniture & Woodworking"
      - "Automotive Components"
    
  - name: "Process Manufacturing (Batch)"
    examples:
      - "Cosmetics & Personal Care"
      - "Chemicals & Petrochemicals"
      - "Food & Beverage"
      - "Pharmaceuticals"
  
  - name: "Hybrid Production"
    examples:
      - "Cosmetics (bulk cooking + discrete filling)"
      - "Food Processing (batch cooking + packaging)"

# Core modules included in the template
core_modules:
  - name: "MRP (Material Requirements Planning)"
    status: "production-ready"
    test_coverage: 95
    endpoints: 2
    description: "Order consolidation, BOM explosion, net requirements calculation"
    
  - name: "Dispatching & Scheduling"
    status: "production-ready"
    test_coverage: 92
    endpoints: 5
    description: "Order release, task dispatch, work center load, Gantt scheduling"
    
  - name: "Inventory Management"
    status: "mvp"
    test_coverage: 85
    endpoints: 8
    description: "Stock balances, reservations, expiry tracking (simplified WMS)"
    
  - name: "BOM Management"
    status: "production-ready"
    test_coverage: 90
    endpoints: 4
    description: "Multi-level Bill of Materials with recursive explosion"
    
  - name: "Product Master Data"
    status: "production-ready"
    test_coverage: 88
    endpoints: 6
    description: "Products, materials, packaging, finished goods catalog"
    
  - name: "Work Center Management"
    status: "production-ready"
    test_coverage: 87
    endpoints: 4
    description: "Equipment, capacity, parallel operations, maintenance status"

# Technical stack
tech_stack:
  backend:
    framework: "FastAPI"
    version: "0.104"
    language: "Python 3.11"
    orm: "SQLAlchemy 2.0"
    validation: "Pydantic 2.0"
    
  frontend:
    framework: "React"
    version: "18"
    language: "TypeScript 5.0"
    build_tool: "Vite 4"
    ui_library: "Tailwind CSS"
    
  database:
    engine: "PostgreSQL"
    version: "15"
    migration_tool: "Alembic"
    tables: 13
    
  deployment:
    containerization: "Docker"
    orchestration: "Dokploy"
    reverse_proxy: "Traefik 2.0"
    ssl: "Let's Encrypt"
    
  testing:
    framework: "pytest"
    coverage_tool: "pytest-cov"
    total_tests: 141
    overall_coverage: 93

# Quality metrics
quality_metrics:
  backend:
    total_tests: 141
    test_coverage_percent: 93
    lines_of_code: 10000
    flake8_errors: 0
    mypy_errors: 0
    
  frontend:
    typescript_coverage_percent: 100
    eslint_errors: 0
    bundle_size_kb: 324
    lighthouse_score: 95
    lines_of_code: 5000
    
  api:
    total_endpoints: 60
    openapi_spec: true
    response_time_p95_ms: 100
    error_rate_percent: 0.1

# Production deployment reference
production_reference:
  factory_name: "DSIZ (Cosmetics)"
  deployment_date: "2026-01-19"
  url: "https://mes-midex-ru.factoryall.ru"
  infrastructure:
    provider: "Beget VPS"
    cpu_cores: 4
    ram_gb: 8
    storage_gb: 50
  results:
    planning_time_reduction_percent: 60
    equipment_utilization_increase_percent: 25
    defect_reduction_percent: 15

# Customization capabilities
customization:
  configuration_layer:
    file: "config/factory_config.yaml"
    examples:
      - "MRP planning horizon"
      - "Batch production parameters"
      - "Work shifts schedule"
      - "Dispatching strategy (FIFO/Priority)"
      
  code_extension_layer:
    directory: "backend/customizations/"
    patterns:
      - "Service inheritance (MRP, Dispatching)"
      - "Custom business rules"
      - "External integrations (ERP, WMS, IoT)"
      - "Additional database models"
      - "Custom API endpoints"

