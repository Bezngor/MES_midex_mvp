# Work Shifts Configuration Template

shifts:
  - name: "Day Shift"
    start_time: "08:00"
    end_time: "16:00"
    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
    capacity_multiplier: 1.0
    
  - name: "Evening Shift"
    start_time: "16:00"
    end_time: "00:00"
    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
    capacity_multiplier: 0.9
    
  - name: "Night Shift"
    start_time: "00:00"
    end_time: "08:00"
    days: ["tuesday", "wednesday", "thursday", "friday", "saturday"]
    capacity_multiplier: 0.8

# Holidays (production stopped)
holidays:
  - date: "2026-01-01"
    name: "New Year"
  - date: "2026-05-01"
    name: "Labour Day"
  - date: "2026-12-25"
    name: "Christmas"
