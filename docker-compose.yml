version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mes_postgres
    environment:
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_password
      POSTGRES_DB: mes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_user -d mes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mes_backend
    environment:
      DATABASE_URL: postgresql://mes_user:mes_password@postgres:5432/mes_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
    command: uvicorn backend.src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
